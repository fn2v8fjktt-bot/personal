<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡池管理系统</title>
<style>
body{margin:0;font-family:"Microsoft YaHei",sans-serif;background:#FFDB5C;color:#333;}
.container{max-width:600px;margin:auto;padding:20px;}
h1{font-size:1.5em;margin-bottom:20px;}
.new-pool-btn{display:block;width:100%;background:#000;color:#fff;text-align:center;padding:12px;font-size:1em;border-radius:8px;cursor:pointer;margin-bottom:20px;}
.pool-card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.pool-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;cursor:pointer;}
.pool-title{font-weight:bold;font-size:1.1em;}
.pool-total{font-size:0.9em;color:#3C3576;}
.pool-body{display:flex;flex-wrap:wrap;gap:10px;transition:max-height 0.3s ease;overflow:hidden;}
.pool-btn{background:#FFE77A;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;position:relative;}
.entry-delete{position:absolute;top:-5px;right:-5px;background:#000;color:#fff;border-radius:50%;font-size:12px;width:18px;height:18px;line-height:18px;text-align:center;cursor:pointer;}
.empty-state{background:#FFE77A;padding:20px;text-align:center;border-radius:12px;font-size:1em;}
.login-container{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;}
.login-box{background:#fff;padding:20px;border-radius:12px;width:300px;}
.login-box input{width:100%;padding:8px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
.login-box button{width:100%;padding:10px;background:#000;color:#fff;border:none;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>
<div class="login-container" id="loginContainer">
  <div class="login-box">
    <h3>登录 / 注册</h3>
    <input type="text" id="username" placeholder="用户名">
    <input type="password" id="password" placeholder="密码">
    <button id="loginBtn">登录</button>
  </div>
</div>

<div class="container" id="mainContainer" style="display:none;">
<h1>卡池管理</h1>
<div class="new-pool-btn" id="newPoolBtn">新建卡池 +</div>
<div id="poolContainer">
<div class="empty-state" id="emptyState">当前还没有卡池记录<br>快点击上方“新建卡池”去记录吧</div>
</div>
</div>

<script>
let currentUser=null;
const loginContainer=document.getElementById('loginContainer');
const mainContainer=document.getElementById('mainContainer');
const poolContainer=document.getElementById('poolContainer');
const newPoolBtn=document.getElementById('newPoolBtn');
const emptyState=document.getElementById('emptyState');
const isTouchDevice='ontouchstart' in window||navigator.maxTouchPoints>0;

// 登录/注册
document.getElementById('loginBtn').addEventListener('click',()=>{
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  if(!u||!p){alert('请输入用户名和密码');return;}
  
  let users=JSON.parse(localStorage.getItem('users')||'{}');
  if(!users[u]) users[u]={password:p,data:null};
  else if(users[u].password!==p){alert('密码错误');return;}
  
  currentUser=u;
  loginContainer.style.display='none';
  mainContainer.style.display='block';
  loadUserData();
});

// 自动保存数据
function saveUserData(){
  if(!currentUser) return;
  let users=JSON.parse(localStorage.getItem('users')||'{}');
  let data=[];
  poolContainer.querySelectorAll('.pool-card').forEach(card=>{
    let poolName=card.querySelector('.pool-title').innerText;
    let entries=[];
    card.querySelectorAll('.entry-btn').forEach(btn=>{
      let [name,num]=btn.innerText.split(' ');
      entries.push({name,num:parseInt(num)});
    });
    data.push({poolName,entries});
  });
  users[currentUser].data=data;
  localStorage.setItem('users',JSON.stringify(users));
}

// 加载用户数据
function loadUserData(){
  poolContainer.innerHTML='';
  let users=JSON.parse(localStorage.getItem('users')||'{}');
  let data=users[currentUser].data;
  if(!data||data.length===0){emptyState.style.display='block';return;}
  emptyState.style.display='none';
  data.forEach(pool=>createPool(pool.poolName,pool.entries));
}

// 创建卡池
function createPool(name,entries=[]){
  const card=document.createElement('div'); card.className='pool-card';
  card.innerHTML=`<div class="pool-header"><span class="pool-title">${name}</span><span class="pool-total">共计0/80</span></div><div class="pool-body"></div><div style="margin-top:10px;"><button class="pool-btn new-btn" onclick="addEntry(this)">新建</button></div>`;
  poolContainer.appendChild(card);
  emptyState.style.display='none';

  const header=card.querySelector('.pool-header');
  const body=card.querySelector('.pool-body');
  const totalLabel=card.querySelector('.pool-total');

  header.addEventListener('click',()=>{body.style.maxHeight?body.style.maxHeight='':body.style.maxHeight=body.scrollHeight+'px';});

  function updateTotal(){
    let sum=0;
    body.querySelectorAll('.entry-btn').forEach(btn=>{let parts=btn.innerText.split(' ');sum+=parseInt(parts[1]);});
    totalLabel.innerText=`共计${sum}/80`;
    saveUserData();
  }

  window.addEntry=function(btn,nameFromData){
    let entryName=nameFromData||prompt('请输入词条名称','果');
    if(!entryName) return;
    const entryBtn=document.createElement('button'); entryBtn.className='pool-btn entry-btn'; entryBtn.innerText=entryName+' 0';
    const delBtn=document.createElement('span'); delBtn.className='entry-delete'; delBtn.innerText='×';
    delBtn.onclick=(e)=>{entryBtn.remove();delBtn.remove();updateTotal();e.stopPropagation();};
    entryBtn.appendChild(delBtn);
    body.appendChild(entryBtn);
    body.style.maxHeight=body.scrollHeight+'px';
    updateTotal();

    entryBtn.addEventListener('click',()=>{let [label,num]=entryBtn.innerText.split(' ');num=parseInt(num)+1;entryBtn.innerText=`${label} ${num}`;entryBtn.appendChild(delBtn);updateTotal();});

    if(isTouchDevice){
      let timer;
      entryBtn.addEventListener('touchstart',()=>{timer=setTimeout(()=>{entryBtn.remove();updateTotal();},600);});
      entryBtn.addEventListener('touchend',()=>clearTimeout(timer));
    }else{
      entryBtn.addEventListener('dblclick',()=>{entryBtn.remove();updateTotal();});
    }
  }

  entries.forEach(e=>addEntry(null,e.name,e.num));
}

// 新建卡池按钮
newPoolBtn.addEventListener('click',()=>{let name=prompt('请输入卡池名称','柴渣虫');if(name) createPool(name);});
</script>
</body>
</html>
